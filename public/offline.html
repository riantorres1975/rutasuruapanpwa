<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1220" />
    <title>VoyUruapan | Sin conexión</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1e293b, #020617 62%);
        color: #e2e8f0;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      main {
        width: min(92vw, 420px);
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 16px;
        padding: 20px;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(8px);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.2rem;
      }

      p {
        margin: 0;
        line-height: 1.45;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sin conexión</h1>
      <p>
        Estás sin internet en este momento. VoyUruapan seguirá mostrando recursos cacheados y volverá a sincronizar cuando
        regreses en línea.
      </p>
    </main>
  </body>
</html>
